{% extends 'base/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="mb-0">
                    <i class="fas fa-exchange-alt me-2"></i>Change Requests
                </h1>
                <a href="{% url 'cr_create' %}" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>New Change Request
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="crTable">
                            <thead>
                                <tr>
                                    <th>CR Number</th>
                                    <th>App Name</th>
                                    <th>Raised By</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Approved By</th>
                                    <th>Process Manager</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
    {% load static %}
    <script src="{% static 'js/cr_list.js' %}"></script>
{% endblock extra_js %}
