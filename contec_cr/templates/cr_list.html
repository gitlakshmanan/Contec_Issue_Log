{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Change Requests</h1>
    <a href="{% url 'cr_create' %}" class="btn btn-primary">
        <i class="fas fa-plus"></i> New Change Request
    </a>
</div>

<div class="card">
    <div class="card-body">
        <div id="searchPanel" class="mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="Search...">
        </div>
        <div id="crGrid" class="ag-theme-alpine" style="height: 600px; width: 100%;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Column Definitions
    const columnDefs = [
        { 
            headerName: "CR Number", 
            field: "cr_number", 
            filter: 'agTextColumnFilter',
            sortable: true 
        },
        { 
            headerName: "Effecting App", 
            field: "effeting_app", 
            filter: 'agTextColumnFilter',
            sortable: true 
        },
        { 
            headerName: "Raised By", 
            field: "cr_raised_by", 
            filter: 'agTextColumnFilter',
            sortable: true 
        },
        { 
            headerName: "Raised On", 
            field: "cr_raised_on", 
            filter: 'agDateColumnFilter',
            sortable: true 
        },
        { 
            headerName: "Process Manager", 
            field: "process_manager", 
            filter: 'agTextColumnFilter',
            sortable: true 
        },
        { 
            headerName: "Status", 
            field: "status", 
            filter: 'agTextColumnFilter',
            sortable: true,
            cellRenderer: function(params) {
                const status = params.value || 'draft';
                const statusText = status.charAt(0).toUpperCase() + status.slice(1);
                return `<span class="status-badge status-${status}">${statusText}</span>`;
            }
        },
        {
            headerName: "Actions",
            field: "id",
            width: 150,
            cellRenderer: function(params) {
                return `
                    <div class="action-cell">
                        <button class="action-btn view-btn" title="View" data-id="${params.value}">
                            <i class="fas fa-eye text-primary"></i>
                        </button>
                        <button class="action-btn edit-btn" title="Edit" data-id="${params.value}">
                            <i class="fas fa-edit text-success"></i>
                        </button>
                        <button class="action-btn delete-btn" title="Delete" data-id="${params.value}">
                            <i class="fas fa-trash text-danger"></i>
                        </button>
                        <button class="action-btn attach-btn" title="Attachments" data-id="${params.value}">
                            <i class="fas fa-paperclip text-info"></i>
                        </button>
                    </div>
                `;
            },
            sortable: false,
            filter: false
        }
    ];

    // Grid Options
    const gridOptions = {
        columnDefs: columnDefs,
        pagination: true,
        paginationPageSize: 20,
        defaultColDef: {
            resizable: true,
            filter: true
        },
        onGridReady: function(params) {
            loadCRData();
        }
    };

    // Initialize Grid
    document.addEventListener('DOMContentLoaded', function() {
        const gridDiv = document.querySelector('#crGrid');
        new agGrid.Grid(gridDiv, gridOptions);

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            gridOptions.api.setQuickFilter(e.target.value);
        });
    });

    // Load data from API
    function loadCRData() {
        fetch('/api/cr-data/')
            .then(response => response.json())
            .then(data => {
                gridOptions.api.setRowData(data);
            })
            .catch(error => console.error('Error loading data:', error));
    }

    // Event delegation for action buttons
    document.addEventListener('click', function(e) {
        const id = e.target.closest('button')?.dataset.id;
        if (!id) return;

        if (e.target.closest('.view-btn')) {
            window.location.href = `/cr/${id}/`;
        } else if (e.target.closest('.edit-btn')) {
            window.location.href = `/cr/${id}/edit/`;
        } else if (e.target.closest('.delete-btn')) {
            if (confirm('Are you sure you want to delete this Change Request?')) {
                fetch(`/api/cr/${id}/delete/`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            loadCRData(); // Reload grid
                        }
                    });
            }
        } else if (e.target.closest('.attach-btn')) {
            alert('Attachment functionality would open here for CR: ' + id);
        }
    });
</script>
{% endblock %}
