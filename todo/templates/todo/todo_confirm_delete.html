{% extends 'base/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="mb-0">
                    <i class="fas fa-trash me-2"></i>Delete Todo
                </h1>
                <a href="{% url 'todo:detail' todo.pk %}" class="btn btn-light">
                    <i class="fas fa-arrow-left me-2"></i>Back
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-body text-center">
                    <h4 class="mb-4">Are you sure you want to delete this todo?</h4>
                    
                    <div class="alert alert-warning">
                        <h5 class="mb-3">{{ todo.title }}</h5>
                        {% if todo.description %}
                            <p class="mb-0">{{ todo.description|truncatewords:30 }}</p>
                        {% endif %}
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-2"></i>Yes, Delete
                        </button>
                        <a href="{% url 'todo:detail' todo.pk %}" class="btn btn-light ms-2">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
